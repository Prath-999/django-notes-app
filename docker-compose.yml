version: '3.8'

services:
  mysql-db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notesdb
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - notes-network

  notes-app:
    image: notes-app:latest
    container_name: notes-app
    restart: always
    ports:
      - "8000:8000"
    environment:
      DB_NAME: notesdb
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: mysql-db   # 🔥 IMPORTANT FIX
      DB_PORT: 3306
    depends_on:
      - mysql-db
    networks:
      - notes-network

networks:
  notes-network:

volumes:
  mysql-data:
